<svg viewBox="0 0 1408 792" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo negro -->
  <rect width="1408" height="792" fill="#000000"/>

  <!-- Símbolo M (blanco y rojo) -->
  <g id="symbol">
    <!-- M blanco izquierda -->
    <polygon points="537,150 537,350 620,250 620,150" fill="#FFFFFF" stroke="none"/>
    <polygon points="620,150 620,250 703,350 703,150" fill="#FFFFFF" stroke="none"/>

    <!-- M rojo derecha -->
    <polygon points="793,150 793,250 876,350 876,250 876,150" fill="#FF3333" stroke="none"/>
    <polygon points="876,150 876,250 959,350 959,150" fill="#FF3333" stroke="none"/>
  </g>

  <!-- Auto blanco y rojo -->
  <g id="car">
    <!-- Carrocería auto blanco -->
    <path d="M 500 320 Q 550 300 700 300 Q 850 300 900 320 L 880 360 Q 820 340 700 340 Q 580 340 520 360 Z" fill="#FFFFFF" stroke="none"/>
    <ellipse cx="580" cy="370" rx="35" ry="40" fill="#FFFFFF"/>
    <ellipse cx="820" cy="370" rx="35" ry="40" fill="#FFFFFF"/>

    <!-- Elemento rojo decorativo -->
    <path d="M 880 300 L 920 320 L 900 360 L 860 340 Z" fill="#FF3333" stroke="none"/>
  </g>

  <!-- Texto MAYA blanco -->
  <text x="704" y="480" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#FFFFFF" text-anchor="middle">MAYA</text>

  <!-- Texto AUTOPARTES rojo -->
  <text x="704" y="580" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#FF3333" text-anchor="middle">AUTOPARTES</text>

  <!-- Líneas decorativas rojas -->
  <line x1="470" y1="600" x2="570" y2="600" stroke="#FF3333" stroke-width="3"/>
  <line x1="838" y1="600" x2="938" y2="600" stroke="#FF3333" stroke-width="3"/>

  <!-- Tagline -->
  <text x="704" y="680" font-family="Arial, sans-serif" font-size="40" font-style="italic" fill="#CCCCCC" text-anchor="middle">La parte que necesitas.</text>
</svg>